services:
  inventory-db:
    image: mysql:8.0
    container_name: inventory-mysql
    restart: always
    command: --lower_case_table_names=1
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${DB_NAME}"
    ports:
      - "${DB_PORT_EXTERNAL}:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d

  inventory-api:
    build: ./Inventory_API
    container_name: inventory-api
    restart: always
    depends_on:
      - inventory-db
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:${API_PORT}
      - ConnectionStrings__DefaultConnection=Server=inventory-db;Database=${DB_NAME};Uid=${DB_USER};Pwd=${DB_ROOT_PASSWORD};AllowUserVariables=True

  inventory-web:
    build: ./inventory_app
    container_name: inventory-web
    restart: always
    depends_on:
      - inventory-api
    ports:
      - "8080:80"